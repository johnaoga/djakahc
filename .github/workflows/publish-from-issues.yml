name: Publish from Issues

on:
  issues:
    types: [opened, edited, labeled, reopened, deleted]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  generate:
    if: github.event.action != 'deleted'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const toEnsure = [
              { name: 'type:news', color: '0366d6', description: 'Website: News item' },
              { name: 'type:competition', color: '0e8a16', description: 'Website: Competition' },
              { name: 'type:player', color: 'b60205', description: 'Website: Player' },
              { name: 'type:post', color: '1d76db', description: 'Website: Blog Post' },
              { name: 'type:gallery', color: 'fbca04', description: 'Website: Gallery Item' },
              { name: 'lang:fr', color: '5319e7', description: 'French content' },
              { name: 'lang:en', color: 'e99695', description: 'English content' },
              { name: 'auto:companion', color: 'c5def5', description: 'Auto-created companion issue' },
              { name: 'auto:gallery', color: 'd4c5f9', description: 'Auto-created gallery issue from article images' },
            ];
            for (const l of toEnsure) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: l.name });
              } catch (e) {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: l.name, color: l.color, description: l.description });
              }
            }

      - name: Add lang label based on form
        if: contains(github.event.issue.labels.*.name, 'type:news') || contains(github.event.issue.labels.*.name, 'type:competition') || contains(github.event.issue.labels.*.name, 'type:player') || contains(github.event.issue.labels.*.name, 'type:post') || contains(github.event.issue.labels.*.name, 'type:gallery')
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const m = body.match(/^###\s+Language\n([\s\S]*?)(?:\n### |$)/mi);
            const lang = (m && m[1] || '').trim().toLowerCase();
            if (lang === 'fr' || lang === 'en') {
              await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: [`lang:${lang}`] });
            }

      - name: Install script deps
        run: |
          echo "No deps"

      - name: Generate content from issue
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          node scripts/issue-to-content.mjs

      - name: Commit and push changes to feature branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ACTION: ${{ github.event.action }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -e
          if [ "$EVENT_ACTION" = "edited" ]; then
            BRANCH="content/issue-${ISSUE_NUMBER}-edit-${RUN_NUMBER}"
          else
            BRANCH="content/issue-${ISSUE_NUMBER}"
          fi
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin
          if [ "$EVENT_ACTION" != "edited" ] && git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Remote branch exists; checking out origin/$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            echo "Creating new branch from origin/main -> $BRANCH"
            git checkout -B "$BRANCH" origin/main
          fi
          git add content/**
          if git diff --cached --quiet; then
            echo "No content changes"; exit 0;
          fi
          git commit -m "chore(content): generate from #${ISSUE_NUMBER}"
          git push -u origin "$BRANCH"

      - name: Open or update Pull Request
        id: pr_step
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ACTION: ${{ github.event.action }}
          BRANCH: ${{ env.BRANCH }}
        with:
          script: |
            const issue_number = parseInt(process.env.ISSUE_NUMBER, 10);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.BRANCH || `content/issue-${issue_number}`;
            const isEdit = process.env.EVENT_ACTION === 'edited';
            try {
              if (!isEdit) {
                // For non-edit events, try to find and update an existing PR
                const prs = await github.rest.pulls.list({ owner, repo, state: 'open', head: `${owner}:${branch}` });
                if (prs.data.length > 0) {
                  const pr = prs.data[0];
                  core.info(`PR already exists: #${pr.number}`);
                  const title = pr.title || `content: generate from #${issue_number}`;
                  const body = (pr.body || '').includes(`#${issue_number}`) ? pr.body : `${pr.body ? pr.body + '\n\n' : ''}Closes #${issue_number}`;
                  await github.rest.pulls.update({ owner, repo, pull_number: pr.number, title, body });
                  core.setOutput('pr_number', String(pr.number));
                  core.setOutput('pr_url', pr.html_url);
                  return;
                }
              }
              // Create a new PR (always for edits, or if none exists for other events)
              const suffix = isEdit ? ' (edit)' : '';
              const title = `content: generate from #${issue_number}${suffix}`;
              const body = `Closes #${issue_number}`;
              const created = await github.rest.pulls.create({ owner, repo, title, head: branch, base: 'main', body });
              core.info(`Opened PR #${created.data.number}`);
              core.setOutput('pr_number', String(created.data.number));
              core.setOutput('pr_url', created.data.html_url);
            } catch (e) {
              core.warning(`Could not create/update PR automatically: ${e.message}`);
              core.setOutput('pr_number', '');
              core.setOutput('pr_url', '');
            }

      - name: Comment with manual PR link if needed
        if: ${{ steps.pr_step.outputs.pr_number == '' }}
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BRANCH: ${{ env.BRANCH }}
        with:
          script: |
            const issue_number = parseInt(process.env.ISSUE_NUMBER, 10);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.BRANCH || `content/issue-${issue_number}`;
            const url = `https://github.com/${owner}/${repo}/compare/main...${encodeURIComponent(branch)}?expand=1&title=${encodeURIComponent('content: generate from #' + issue_number)}&body=${encodeURIComponent('Closes #' + issue_number)}`;
            const body = `A branch has been pushed: \`${branch}\`\n\nGitHub Actions cannot open PRs in this repository. Please open a PR manually using this link:\n\n${url}`;
            await github.rest.issues.createComment({ owner, repo, issue_number, body });

      - name: Create companion issue in other language
        if: github.event.action == 'opened' && !contains(github.event.issue.labels.*.name, 'auto:companion')
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = (issue.labels || []).map(l => l.name);

            // Determine current language from the issue body
            const body = issue.body || '';
            const langMatch = body.match(/^###\s+Language\n\n(\S+)/mi);
            const currentLang = (langMatch && langMatch[1] || '').trim().toLowerCase();
            if (currentLang !== 'fr' && currentLang !== 'en') {
              core.info(`Language not detected or not fr/en (got '${currentLang}'), skipping companion.`);
              return;
            }
            const otherLang = currentLang === 'fr' ? 'en' : 'fr';

            // Swap the language in the issue body
            const newBody = body.replace(
              /^(###\s+Language\n\n)\S+/mi,
              `$1${otherLang}`
            );

            // Build labels: swap lang label, add auto:companion, keep type labels
            const newLabels = labels
              .filter(l => !l.startsWith('lang:'))
              .concat([`lang:${otherLang}`, 'auto:companion']);

            const langTag = otherLang.toUpperCase();
            const newTitle = `[${langTag}] ${issue.title}`;

            const created = await github.rest.issues.create({
              owner, repo,
              title: newTitle,
              body: newBody,
              labels: newLabels,
            });
            core.info(`Created companion issue #${created.data.number} (${otherLang})`);

            // Cross-reference both issues
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: issue.number,
              body: `🌐 Companion issue for **${otherLang.toUpperCase()}** translation: #${created.data.number}`,
            });
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: created.data.number,
              body: `🌐 This is the **${otherLang.toUpperCase()}** companion of #${issue.number}`,
            });

      - name: Create gallery issues from article images
        if: github.event.action == 'opened' && !contains(github.event.issue.labels.*.name, 'auto:gallery') && !contains(github.event.issue.labels.*.name, 'type:gallery')
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = (issue.labels || []).map(l => l.name);
            const body = issue.body || '';

            // Detect language
            const langMatch = body.match(/^###\s+Language\n\n(\S+)/mi);
            const lang = (langMatch && langMatch[1] || '').trim().toLowerCase();
            if (lang !== 'fr' && lang !== 'en') {
              core.info('Language not detected, skipping gallery creation');
              return;
            }

            // Helper: parse a form field by its heading
            function parseField(heading) {
              const lines = body.split(/\r?\n/);
              const target = heading.toLowerCase();
              let start = -1;
              for (let i = 0; i < lines.length; i++) {
                if (lines[i].trim().toLowerCase() === `### ${target}`) { start = i + 1; break; }
              }
              if (start === -1) return '';
              const out = [];
              for (let i = start; i < lines.length; i++) {
                if (/^###\s+/.test(lines[i].trim())) break;
                out.push(lines[i]);
              }
              return out.join('\n').trim();
            }

            // Get article title and summary for caption
            const articleTitle = parseField('Title') || parseField('Player full name') || issue.title || 'Article';
            const articleSummary = parseField('Summary (short)') || '';
            const caption = (articleSummary || articleTitle).substring(0, 200);

            // Collect all image URLs (only http/https)
            const imageUrls = [];
            const seen = new Set();
            function addUrl(url) {
              const u = (url || '').trim();
              if (/^https?:\/\//i.test(u) && !seen.has(u)) {
                seen.add(u);
                imageUrls.push(u);
              }
            }

            // Named image fields
            addUrl(parseField('Cover image filename or static path (optional)'));
            addUrl(parseField('Cover image relative path (optional)'));
            addUrl(parseField('Featured image relative path (optional)'));
            addUrl(parseField('Photo'));
            addUrl(parseField('Photo relative path (optional)'));

            // Gallery images (comma separated)
            const galleryField = parseField('Gallery images (comma separated, optional)');
            if (galleryField) {
              galleryField.split(',').forEach(s => addUrl(s));
            }

            // Inline markdown images in the whole body
            const inlineRe = /!\[[^\]]*\]\((https?:\/\/[^)\s]+)\)/gi;
            let m;
            while ((m = inlineRe.exec(body)) !== null) {
              addUrl(m[1]);
            }

            if (imageUrls.length === 0) {
              core.info('No image URLs found, skipping gallery creation');
              return;
            }

            // Determine article tags from the issue
            const existingTags = parseField('Tags (comma separated)');
            const tagList = [articleTitle];
            if (existingTags) {
              existingTags.split(',').map(t => t.trim()).filter(Boolean).forEach(t => tagList.push(t));
            }
            const tagsStr = tagList.join(', ');

            // Create a gallery issue for each image
            const galleryLabels = ['type:gallery', `lang:${lang}`, 'auto:gallery', 'auto:companion'];
            const createdNumbers = [];

            for (let idx = 0; idx < imageUrls.length; idx++) {
              const imgTitle = `${articleTitle} – Image ${idx + 1}`;
              const galleryBody = [
                '### Language', '', lang,
                '', '### Title', '', imgTitle,
                '', '### Image', '', imageUrls[idx],
                '', '### Caption', '', caption,
                '', '### Tags (comma separated)', '', tagsStr,
                '', '### Source Article', '', `#${issue.number} – ${articleTitle}`,
              ].join('\n');

              const created = await github.rest.issues.create({
                owner, repo,
                title: `[Gallery] ${imgTitle}`,
                body: galleryBody,
                labels: galleryLabels,
              });
              createdNumbers.push(created.data.number);
              core.info(`Created gallery issue #${created.data.number} for image ${idx + 1}`);
            }

            // Comment on original issue
            const links = createdNumbers.map(n => `#${n}`).join(', ');
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: issue.number,
              body: `🖼️ Created ${createdNumbers.length} gallery issue(s) from images: ${links}`,
            });

  archive:
    if: github.event.action == 'deleted'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          ref: main

      - name: Archive content for deleted issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          echo "Looking for content files with issue_number: ${ISSUE_NUMBER}"
          FOUND=0
          # Search all index.md files for matching issue_number in front matter
          for f in $(grep -rl "^issue_number: ${ISSUE_NUMBER}$" content/ || true); do
            echo "Archiving: $f"
            # Set draft: true (replace existing draft: false)
            sed -i 's/^draft: false$/draft: true/' "$f"
            # Add archived fields after draft line if not already present
            if ! grep -q '^archived:' "$f"; then
              sed -i "/^draft: true$/a archived: true\narchived_date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" "$f"
            fi
            FOUND=1
          done
          if [ "$FOUND" = "0" ]; then
            echo "No content found for issue #${ISSUE_NUMBER}, nothing to archive."
            exit 0
          fi

      - name: Commit and push archive changes
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/**
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(content): archive content from deleted issue #${ISSUE_NUMBER}"
          git push origin main
